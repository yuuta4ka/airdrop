services:
  - type: web
    name: airdrop
    runtime: node
    plan: free
    buildCommand: node scripts/setup-runtime-deps.mjs
    startCommand: node server.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_IDS
        sync: false
