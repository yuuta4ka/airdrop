<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="/js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — АирДроп</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=20260714r" />
  <link rel="stylesheet" href="/css/product-mobile.css?v=20260714r" />
</head>
<body data-show-catalog-toggle="true" data-cart="true">
  <header class="header" id="site-header"></header>

  <main class="product-page">
    <div class="container" id="product-page-root">
      <div id="product-skeleton" class="product-skeleton" aria-hidden="true">
        <div class="skeleton-block product-skeleton__image"></div>
        <div class="product-skeleton__info">
          <div class="skeleton-line skeleton-line--sm"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line skeleton-line--price"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
      <nav class="breadcrumb" hidden id="product-breadcrumb">
        <a href="/catalog">Каталог</a>
        <span>/</span>
        <span id="breadcrumb-name"></span>
      </nav>

      <div class="product-detail" id="product-detail" hidden>
        <div class="product-detail__gallery">
          <div class="product-gallery" id="product-gallery">
            <div class="product-detail__image product-gallery__stage" id="product-gallery-stage">
              <span class="product-card__badge" id="product-badge" style="display:none"></span>
              <button type="button" class="product-gallery__nav product-gallery__nav--prev" id="gallery-prev" aria-label="Предыдущее фото" hidden>‹</button>
              <img src="" alt="" class="product-detail__photo" id="product-photo" fetchpriority="high" decoding="async" />
              <button type="button" class="product-gallery__nav product-gallery__nav--next" id="gallery-next" aria-label="Следующее фото" hidden>›</button>
            </div>
          </div>
        </div>

        <div class="product-detail__info">
          <div class="product-card__brand" id="product-brand"></div>
          <h1 class="product-detail__title" id="product-title"></h1>
          <p class="product-detail__desc" id="product-description"></p>

          <div id="buy-bar-slot" class="product-buy-panel">
            <div class="product-buy-panel__top">
              <div class="product-detail__price-block">
                <div class="product-detail__price" id="product-price"></div>
              </div>
              <div id="stock-info"></div>
            </div>
            <button type="button" class="product-detail__buy" id="add-to-cart">Купить</button>
          </div>

          <div class="option-group option-group--swatches" id="group-colors">
            <div class="option-group__list option-group__list--swatches" id="option-colors"></div>
            <p class="color-selection-status" id="color-selection-status" hidden></p>
          </div>

          <div class="option-group" id="group-sim" style="display:none">
            <h3 class="option-group__title">Версия SIM</h3>
            <div class="option-group__list" id="option-sim"></div>
          </div>

          <div class="option-group" id="group-storage">
            <h3 class="option-group__title">Память</h3>
            <div class="option-group__list" id="option-storage"></div>
          </div>

          <div class="option-group" id="group-sizes" style="display:none">
            <h3 class="option-group__title">Размер</h3>
            <div class="option-group__list" id="option-sizes"></div>
          </div>

          <div class="option-group" id="group-warranty">
            <h3 class="option-group__title">Гарантия</h3>
            <div class="option-group__list" id="option-warranty"></div>
          </div>

          <div id="product-installment-calc"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart" id="cart-panel">
    <div class="cart__header">
      <h2 class="cart__title" id="cart-title">Корзина</h2>
      <button class="cart__close" id="cart-close" aria-label="Закрыть">✕</button>
    </div>
    <div class="cart__items" id="cart-items"></div>
    <div class="cart__footer">
      <div class="cart__total">
        <span class="cart__total-label">Итого</span>
        <span class="cart__total-value" id="cart-total">0 ₽</span>
      </div>
      <button class="cart__checkout" id="cart-checkout" disabled>Оформить заказ</button>
    </div>
  </aside>

  <div class="color-cursor-tip" id="color-cursor-tip" hidden></div>
  <div class="toast" id="toast"></div>

  <script type="module" src="/js/product.js?v=20260716k"></script>
</body>
</html>
