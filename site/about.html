<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>О нас — АирДроп</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header" id="site-header"></header>
  <main class="page-main">
    <div class="container page-content page-content--wide">
      <h1 class="page-title">О нас</h1>
      <p class="page-lead" id="about-text"></p>
      <ul class="why-us" id="about-why"></ul>
    </div>
  </main>
  <footer class="footer" id="site-footer"></footer>
  <script type="module">
    import { loadStore } from './js/store.js'
    import { renderHeader, renderFooter } from './js/layout.js'

    const store = await loadStore()
    document.getElementById('about-text').textContent = store.settings.aboutText
    document.getElementById('about-why').innerHTML = store.settings.whyUs.map((i) => `<li>${i}</li>`).join('')
    await renderHeader('about')
    await renderFooter()
  </script>
</body>
</html>
