<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Админ-панель — АирДроп</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css?v=20260716e" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <form class="login-card" id="login-form">
      <h1>АирДроп Admin</h1>
      <p id="login-subtitle">Введите пароль для входа</p>
      <div class="password-input-wrap">
        <input type="password" id="login-password" placeholder="Пароль" required autofocus />
        <button type="button" class="password-toggle" data-target="login-password" aria-label="Показать пароль">👁</button>
      </div>
      <button type="submit" class="btn btn--primary" id="login-submit">Войти</button>
      <button type="button" class="btn btn--ghost btn--sm" id="login-forgot">Забыли пароль?</button>
      <p class="login-error" id="login-error" hidden></p>
    </form>

    <form class="login-card" id="reset-form" hidden>
      <h1>Сброс пароля</h1>
      <p class="admin-hint">Код придёт в Telegram-бот админам. Не чаще 3 раз в час.</p>
      <button type="button" class="btn btn--secondary" id="reset-request-code">Получить код в Telegram</button>
      <label class="field"><span>Код из Telegram</span><input type="text" id="reset-code" inputmode="numeric" maxlength="6" placeholder="123456" /></label>
      <div class="password-input-wrap">
        <input type="password" id="reset-password" placeholder="Новый пароль" />
        <button type="button" class="password-toggle" data-target="reset-password" aria-label="Показать пароль">👁</button>
      </div>
      <label class="field"><span>Повторите пароль (видно)</span><input type="text" id="reset-confirm" placeholder="Новый пароль ещё раз" /></label>
      <button type="submit" class="btn btn--primary" id="reset-submit">Сменить пароль</button>
      <button type="button" class="btn btn--ghost btn--sm" id="reset-back">← Назад к входу</button>
      <p class="login-error" id="reset-error" hidden></p>
    </form>
  </div>

  <div id="admin-app" class="admin-app" hidden>
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">АирДроп</div>

      <div class="admin-nav-group">
        <div class="admin-nav-group__title">Сайт</div>
        <button class="admin-nav__btn admin-nav__btn--active" data-tab="general">Основное</button>
        <button class="admin-nav__btn" data-tab="contacts">Контакты</button>
        <button class="admin-nav__btn" data-tab="content">Тексты</button>
        <button class="admin-nav__btn" data-tab="links">Ссылки</button>
        <button class="admin-nav__btn" data-tab="navigation">Меню</button>
      </div>

      <div class="admin-nav-group">
        <div class="admin-nav-group__title">Каталог</div>
        <button class="admin-nav__btn" data-tab="categories">Категории</button>
        <button class="admin-nav__btn" data-tab="products">Товары</button>
        <button class="admin-nav__btn" data-tab="price-import">Импорт прайса</button>
        <button class="admin-nav__btn" data-tab="price-prompt">Промпт для прайса</button>
      </div>

      <div class="admin-nav-group">
        <div class="admin-nav-group__title">Оформление</div>
        <button class="admin-nav__btn" data-tab="theme">Темы и цвета</button>
      </div>

      <div class="admin-nav-group">
        <div class="admin-nav-group__title">Прочее</div>
        <button class="admin-nav__btn" data-tab="installment">Рассрочка</button>
        <button class="admin-nav__btn" data-tab="orders">Заказы</button>
        <button class="admin-nav__btn" data-tab="reviews">Отзывы</button>
        <button class="admin-nav__btn" data-tab="config">Экспорт / импорт</button>
      </div>

      <div class="admin-sidebar__footer">
        <a href="/" target="_blank" class="btn btn--ghost">Открыть сайт</a>
        <button class="btn btn--ghost" type="button" id="btn-logout">Выйти</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <h2 id="tab-title">Основное</h2>
        <button class="btn btn--primary" type="button" id="btn-save">Сохранить изменения</button>
      </header>
      <div class="admin-status" id="admin-status"></div>
      <div id="admin-content" class="admin-content" tabindex="-1"></div>
    </main>
  </div>

  <script type="module" src="/js/admin.js?v=20260716m"></script>
</body>
</html>
