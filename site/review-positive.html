<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="/js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибо за отзыв — АирДроп</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="review-page">
  <header class="header" id="site-header"></header>
  <main class="review-main">
    <div class="review-card review-card--wide">
      <div class="review-card__icon review-card__icon--happy">🎉</div>
      <div class="review-stars-display" id="stars-display"></div>
      <h1 class="review-card__title">Спасибо!</h1>
      <p class="review-card__text" id="review-text"></p>
      <div class="review-card__bonus" id="bonus-text"></div>
      <div class="review-actions">
        <a class="review-action-btn review-action-btn--avito" id="link-avito-k" href="#" target="_blank" rel="noopener">🟢 Avito — Карпинск</a>
        <a class="review-action-btn review-action-btn--avito" id="link-avito-kt" href="#" target="_blank" rel="noopener">🟢 Avito — Краснотурьинск</a>
        <a class="review-action-btn review-action-btn--vk" id="link-vk" href="#" target="_blank" rel="noopener">💬 Отзыв во ВКонтакте</a>
        <a class="review-action-btn review-action-btn--yandex" id="link-yandex-k" href="#" target="_blank" rel="noopener">📍 Яндекс.Карты — Карпинск</a>
        <a class="review-action-btn review-action-btn--yandex" id="link-yandex-kt" href="#" target="_blank" rel="noopener">📍 Яндекс.Карты — Краснотурьинск</a>
      </div>
      <a href="/catalog" class="review-back">← Вернуться в магазин</a>
    </div>
  </main>
  <script type="module">
    import { renderHeader } from './js/layout.js'
    import './js/review-positive.js'
    await renderHeader('reviews')
  </script>
</body>
</html>
