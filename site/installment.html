<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="/js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рассрочка — АирДроп</title>
  <link rel="stylesheet" href="/css/style.css?v=20260714r" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header" id="site-header"></header>
  <main class="page-main">
    <div class="container page-content">
      <h1 class="page-title">Рассрочка и оплата частями</h1>
      <p class="page-lead" id="installment-lead"></p>

      <section class="info-card installment-section">
        <h2>Рассрочка от банков</h2>
        <p id="installment-banks"></p>
        <div class="installment-table-wrap">
          <table class="info-table installment-table" id="installment-table" data-mode="terms">
            <thead>
              <tr class="installment-table__head-terms">
                <th>Срок</th>
                <th>Комиссия банка</th>
              </tr>
              <tr class="installment-table__head-calc" hidden>
                <th>Срок</th>
                <th>Платёж / мес</th>
                <th>Итого с комиссией</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <label class="calc-price-field">
          <span class="calc-price-field__label">Сумма покупки, ₽</span>
          <input class="calc-price-field__input" id="installment-price-input" type="text" inputmode="numeric" autocomplete="off" />
          <span class="calc-price-field__hint">Нажмите и введите сумму — расчёт обновится автоматически</span>
        </label>
      </section>

      <section class="info-card installment-section">
        <h2 id="dolyami-title"></h2>
        <p id="dolyami-desc"></p>
        <div id="dolyami-widget-mount"></div>
        <label class="calc-price-field">
          <span class="calc-price-field__label">Сумма покупки, ₽</span>
          <input class="calc-price-field__input" id="dolyami-price-input" type="text" inputmode="numeric" autocomplete="off" />
          <span class="calc-price-field__hint">Нажмите и введите сумму — платежи пересчитаются</span>
        </label>
      </section>

      <p class="page-note" id="installment-note"></p>
    </div>
  </main>
  <footer class="footer" id="site-footer"></footer>
  <script type="module">
    import { loadStore } from './js/store.js'
    import { renderHeader, renderFooter } from './js/layout.js'
    import { mountInstallmentBankCalc, mountDolyamiWidget, linkPriceInputs } from './js/installment-calc.js'

    const store = await loadStore()
    const { installment, phone, phoneDisplay, links } = store.settings

    const installmentInput = document.getElementById('installment-price-input')
    const dolyamiInput = document.getElementById('dolyami-price-input')

    document.getElementById('installment-lead').textContent =
      'Рассрочка от 6 банков — одобряет тот, кто предложит лучшие условия. Также доступна оплата «Долями».'
    document.getElementById('installment-banks').textContent = installment.banks
    document.getElementById('dolyami-title').textContent = `Оплата «${installment.dolyami.name}»`
    document.getElementById('dolyami-desc').textContent = installment.dolyami.description
    document.getElementById('installment-note').innerHTML =
      `Уточняйте у менеджера: <a href="tel:${phone}">${phoneDisplay}</a> или <a href="${links.telegram}" target="_blank" rel="noopener">Telegram</a>.`

    const updateBank = mountInstallmentBankCalc(
      document.getElementById('installment-table'),
      installmentInput,
      installment,
      { bindInput: false },
    )
    const updateDolyami = mountDolyamiWidget(
      document.getElementById('dolyami-widget-mount'),
      dolyamiInput,
      installment,
      { bindInput: false },
    )
    linkPriceInputs([installmentInput, dolyamiInput], [updateBank, updateDolyami])

    await renderHeader('installment')
    await renderFooter()
  </script>
</body>
</html>
