<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="/js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Обратная связь — АирДроп</title>
  <link rel="stylesheet" href="/css/style.css?v=20260717i" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="review-page">
  <header class="header" id="site-header"></header>
  <main class="review-main">
    <div class="review-glow review-glow--soft" aria-hidden="true"></div>
    <section class="review-panel review-panel--wide liquid-glass">
      <div class="review-panel__mark review-panel__mark--soft" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12a7 7 0 0 1 7-7h2a7 7 0 0 1 7 7v1a7 7 0 0 1-7 7h-1l-4.2 2.5c-.5.3-1.1-.1-1-.7L7.2 17A7 7 0 0 1 4 13v-1Z"/>
        </svg>
      </div>
      <div class="review-stars-display" id="stars-display" aria-hidden="true"></div>
      <p class="review-panel__eyebrow">Личная обратная связь</p>
      <h1 class="review-panel__title">Нам важно всё исправить</h1>
      <p class="review-panel__lead">
        Напишите, что пошло не так — владелец магазина разберётся лично.
        Сообщение останется только внутри компании.
      </p>
      <div class="review-actions" id="review-actions"></div>
      <a href="/catalog" class="review-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m11 6-6 6 6 6"/></svg>
        Вернуться в магазин
      </a>
    </section>
  </main>
  <script type="module">
    import { renderHeader } from './js/layout.js'
    import './js/review-negative.js'
    await renderHeader('reviews')
  </script>
</body>
</html>
