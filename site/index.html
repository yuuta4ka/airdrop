<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АирДроп — техника Apple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-show-catalog-toggle="true">
  <header class="header" id="site-header"></header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero__content">
          <div class="hero__badge"><span class="hero__badge-dot"></span>Карпинск и Краснотурьинск</div>
          <h1 class="hero__title" id="home-hero-title">АирДроп — техника Apple<br /><span>в наличии и под заказ</span></h1>
          <p class="hero__subtitle" id="home-hero-text"></p>
          <div class="hero__actions">
            <a href="catalog.html" class="btn btn--primary">Каталог новых устройств</a>
            <a href="https://vk.com/market-213684685?screen=group" class="btn btn--secondary" target="_blank" rel="noopener">Б/У и наличие во ВКонтакте</a>
          </div>
        </div>
      </div>
    </section>

    <section class="features" id="about-preview">
      <div class="container">
        <h2 class="section-title">Почему АирДроп</h2>
        <ul class="why-us" id="home-why-us"></ul>
      </div>
    </section>
  </main>

  <footer class="footer" id="site-footer"></footer>

  <script type="module">
    import { loadStore } from './js/store.js'
    import { renderHeader, renderFooter } from './js/layout.js'

    const store = await loadStore()
    document.getElementById('home-hero-text').textContent = store.settings.heroText || store.settings.description
    document.getElementById('home-why-us').innerHTML = store.settings.whyUs.map((i) => `<li>${i}</li>`).join('')
    await renderHeader('home')
    await renderFooter()
  </script>
</body>
</html>
