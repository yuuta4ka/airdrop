<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <script src="js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакты — АирДроп</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header" id="site-header"></header>
  <main class="page-main">
    <div class="container page-content">
      <h1 class="page-title">Контакты</h1>
      <div class="contacts-grid" id="contacts-content"></div>
    </div>
  </main>
  <footer class="footer" id="site-footer"></footer>
  <script type="module">
    import { loadStore } from './js/store.js'
    import { renderHeader, renderFooter } from './js/layout.js'
    import { renderStorePhotosHtml, initStorePhotoGalleries } from './js/stores-ui.js'

    const store = await loadStore()
    const s = store.settings
    document.getElementById('contacts-content').innerHTML = `
      <div class="info-card">
        <h2>${s.phoneContactName || 'Илья'}</h2>
        <p><a href="tel:${s.phone}" class="contact-big">${s.phoneDisplay}</a></p>
      </div>
      ${s.addresses.map((a) => `
        <div class="info-card info-card--store">
          <h2>${a.city}</h2>
          ${a.photos?.length ? renderStorePhotosHtml(a.photos, { variant: 'inline' }) : ''}
          <p><a href="${a.yandexMaps}" target="_blank" rel="noopener" class="contact-address-link">${a.street}${a.note ? ` (${a.note})` : ''}</a></p>
          <p class="contact-hours">${s.hours.weekdays}<br>${s.hours.weekends}</p>
          <a href="${a.yandexMaps}" class="btn btn--secondary" target="_blank" rel="noopener">Яндекс.Карты →</a>
        </div>
      `).join('')}
      <div class="info-card">
        <h2>Мы в сети</h2>
        <p><a href="${s.links.telegram}" target="_blank" rel="noopener">Telegram-канал</a></p>
        <p><a href="${s.links.vk}" target="_blank" rel="noopener">ВКонтакте</a></p>
        <p><a href="${s.links.avitoKarpinsk}" target="_blank" rel="noopener">Avito — Карпинск</a></p>
        <p><a href="${s.links.avitoKrasnoturinsk}" target="_blank" rel="noopener">Avito — Краснотурьинск</a></p>
      </div>
    `
    initStorePhotoGalleries()
    await renderHeader('contacts')
    await renderFooter()
  </script>
</body>
</html>
