meta:
  environment: node
  toolchain:
    name: npm
    version: "20"

build:
  skip: false
  # Подготовка vendor-зависимостей на этапе сборки (не в nodeArguments)
  additionalCommands: node scripts/setup-runtime-deps.mjs
  artifacts:
    "*": /

run:
  # Amvera запускает: node ${nodeArguments} ${scriptName} ${scriptArguments}
  # Сюда нельзя писать shell-операторы вроде &&
  scriptName: server.mjs
  persistenceMount: /data
  containerPort: "8080"
